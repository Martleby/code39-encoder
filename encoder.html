<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      
    </style>

    <title>Code 39 Encoder</title>
  </head>
  <body>
    <div class="h-dvh w-full flex items-center justify-center" x-data="encoder">
      <div class="flex flex-col gap-y-2 items-center">
        <div>
          <label class="block" for="">Text to encode:</label>
          <input class="border rounded-md px-1" x-model="inputText" type="text" />
        </div>

        <!-- <div x-text="barcodePattern"></div> -->

        <div>HTML</div>
        <div class="flex mx-10">
          <template x-for="(c, index) in barcodePattern" :key="index">
            <div class="flex">
              <template x-if="c === 'W'">
                <div :class="'h-16 w-1 ' + currentColor(index)"></div>
              </template>

              <template x-if="c === 'N'">
                <div :class="'h-16 w-0.5 ' + currentColor(index)"></div>
              </template>

              <template x-if="c === '@'">
                <div class="h-16 w-0.5 bg-white"></div>
              </template>
            </div>
          </template>
        </div>
        
        <div class="bg-white -mt-2 p-1 text-xs" x-text="outputText"></div>

        <!-- <div x-text="barcodePattern"></div> -->

        <div class="mt-5">CANVAS</div>
        <div x-effect="drawCanvas(barcodePattern)">

            <canvas class="" x-ref="bcCanvas" id="bcCanvas" width="200" height="80">

            </canvas>

        </div>

        <div class="mt-5">SVG</div>
        <div x-effect="drawSvg(barcodePattern)">

          <svg class="" x-ref="bcSvg" height="100" width="300" xmlns="http://www.w3.org/2000/svg">

          </svg>

        </div>

      </div>

    </div>

    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.data("encoder", () => ({
          inputText: "",
          startColor: "bg-black",
          
          currentColor(index) {

            return index % 2 > 0 ? 'bg-white' : 'bg-black';

          },
          
          drawCanvas(value){
              
            const nWidth = 2
            const wWidth = 4
            const barHeight = 64

            let inputSize = this.outputText.length
            let canvasSize = inputSize * (7 * nWidth + 3 * wWidth)

            const c = this.$refs.bcCanvas;
            const ctx = c.getContext('2d');

            ctx.canvas.width = canvasSize;
            
            ctx.clearRect(0, 0, canvasSize, 200);

            
            let currentX = 0;

            for(let i = 0; i < value.length; i++){

              let char = value[i];

              ctx.fillStyle = i % 2 > 0 ? 'white' : 'black'
              
              if(char == 'W'){
                ctx.fillRect(currentX, 0, wWidth, barHeight);
                currentX += wWidth;

              }

              if(char == 'N'){
                ctx.fillRect(currentX, 0, nWidth, barHeight);
                currentX += nWidth;

              }

              if(char == '@'){
                ctx.fillStyle = 'white';
                ctx.fillRect(currentX, 0, nWidth, barHeight);
                currentX += nWidth;
              }
            
            }

            ctx.font = "12px Arial";
            ctx.fillStyle = 'black'
            let txt = this.outputText
            ctx.fillText(txt, (canvasSize / 2) - (ctx.measureText(txt).width / 2)  , 80);

          },

          drawSvg(value){

            const nWidth = 2
            const wWidth = 4
            const barHeight = 64

            let svg = this.$refs.bcSvg;

            let inputSize = this.outputText.length
            let svgSize = inputSize * (7 * nWidth + 3 * wWidth)

            svg.innerHtml = "";
            svg.text = "";
            svg.replaceChildren();
            svg.setAttribute('width', svgSize + 'px');

            let currentX = 0;

            for(let i = 0; i < value.length; i++){

                let fill = i % 2 > 0 ? 'white' : 'black'

                let rect = document.createElementNS("http://www.w3.org/2000/svg", 'rect' );

                rect.setAttributeNS( null,'x', currentX);
                rect.setAttributeNS( null,'y', 0);
                rect.setAttributeNS( null,'height', barHeight );
                rect.setAttributeNS( null,'fill', fill);

                let char = value[i];

                if(char == 'W'){
                  rect.setAttributeNS( null,'width', wWidth);
                  currentX += wWidth;
                }

                if(char == 'N'){
                  rect.setAttributeNS( null,'width', nWidth);
                  currentX += nWidth;
                }

                if(char == '@'){
                  rect.setAttributeNS( null,'width', nWidth);
                  rect.setAttributeNS( null,'fill', '#fff');
                  currentX += nWidth;
                }

                svg.appendChild( rect );

            }

            let text = document.createElementNS('http://www.w3.org/2000/svg', 'text');

          
            text.setAttribute('y', '80');
            text.setAttribute('fill', '#black');
            text.textContent = this.outputText;
            svg.appendChild(text);
            text.setAttribute('x', (svgSize / 2) - (text.getComputedTextLength() / 2));

            

          },
          
          get outputText() {
            let sanitized = this.inputText.toUpperCase().split('').filter(char => this.code39Inverse[char]).join('')
            return `*${sanitized}*`;
          },
          
          get barcodePattern() {
            let temp = "";
            for (let c of this.outputText) {
              
              let char = this.code39Inverse[c]
              
              if(typeof char === 'undefined'){
                continue;
              }

              temp += this.code39Inverse[c]
              temp += "@";
              
            }

            return temp;
          },

          code39Inverse: {
            0: "NNNWWNWNN",
            1: "WNNWNNNNW",
            2: "NNWWNNNNW",
            3: "WNWWNNNNN",
            4: "NNNWWNNNW",
            5: "WNNWWNNNN",
            6: "NNWWWNNNN",
            7: "NNNWNNWNW",
            8: "WNNWNNWNW",
            9: "NNWWNNWNN",

            A: "WNNNNWNNW",
            B: "NNWNNWNNW",
            C: "WNWNNWNNN",
            D: "NNNNWWNNW",
            E: "WNNNWWNNN",
            F: "NNWNWWNNN",
            G: "NNNNNWWNW",
            H: "WNNNNWWNN",
            I: "NNWNNWWNN",
            J: "NNNNWWWNN",

            K: "WNNNNNNWW",
            L: "NNWNNNNWW",
            M: "WNWNNNNWN",
            N: "NNNNWNNWW",
            O: "WNNNWNNWN",
            P: "NNWNWNNWN",
            Q: "NNNNNNWWW",
            R: "WNNNNNWWN",
            S: "NNWNNNWWN",
            T: "NNNNWNWWN",

            U: "WWNNNNNNW",
            V: "NWWNNNNNW",
            W: "WWWNNNNNN",
            X: "NWNNWNNNW",
            Y: "WWNNWNNNN",
            Z: "NWWNWNNNN",

            "-": "NWNNNNWNW",
            ".": "WWNNNNWNN",
            " ": "NWWNNNWNN",
            $: "NWNWNWNNN",
            "/": "NWNWNNNWN",
            "+": "NWNNNWNWN",
            "%": "NNNWNWNWN",

            "*": "NWNNWNWNN",
          },
        }));
      });
    </script>
  </body>
</html>
