<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>

      #bcCanvas {  
        image-rendering: pixelated; /* Chrome, Firefox */  
        image-rendering: crisp-edges; /* Safari */  
      }  
      
    </style>

    <title>Code 39 Encoder</title>
  </head>
  <body>
    <div class="h-dvh w-full flex items-center justify-center" x-data="encoder">
      <div class="flex flex-col gap-y-2 items-center">
        <div>
          <label class="block" for="">Text to encode:</label>
          <input @keyup.escape="inputText=''" class="border rounded-md px-1" x-model="inputText" type="text" />
        </div>

        <!-- <div x-text="barcodePattern"></div> -->

        <div>HTML</div>
        <div class="flex mx-10">
          <template x-for="(c, index) in barcodePattern" :key="index">
            <div class="flex">
              <template x-if="c === 'W'">
                <div :class="'h-16 w-1 ' + currentColor(index)"></div>
              </template>

              <template x-if="c === 'N'">
                <div :class="'h-16 w-0.5 ' + currentColor(index)"></div>
              </template>

              <template x-if="c === '@'">
                <div class="h-16 w-0.5 bg-white"></div>
              </template>
            </div>
          </template>
        </div>
        
        <div class="bg-white -mt-2 p-1 text-xs" x-text="outputText"></div>

        <!-- <div x-text="barcodePattern"></div> -->

        <div class="mt-5">CANVAS</div>
        <div x-effect="drawCanvas(barcodePattern)">

            <canvas class="" x-ref="bcCanvas" id="bcCanvas" width="200" height="100">

            </canvas>

        </div>

        <div class="mt-5">SVG</div>
        <div x-effect="drawSvg(barcodePattern)">

          <svg class="" x-ref="bcSvg" height="100" width="300" xmlns="http://www.w3.org/2000/svg">

          </svg>

        </div>

      </div>

    </div>

    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.data("encoder", () => ({
          inputText: "",
          startColor: "bg-black",
          nWidth: 2,
          wWidth: 4,
          barHeight: 64,
          
          currentColor(index) {

            return index % 2 > 0 ? 'bg-white' : 'bg-black';

          },
          
          drawCanvas(value){
              
            const c = this.$refs.bcCanvas;
            const ctx = c.getContext('2d');

            ctx.canvas.width = this.canvasWidth;
            
            ctx.clearRect(0, 0, this.canvasWidth, 200);

            const config = {
              'W': { width: this.wWidth },
              'N': { width: this.nWidth },
              '@': { width: this.nWidth, forceColor: 'white' }
            };

            let currentX = 0;

            [...value].forEach((char, i) => {

              let item = config[char]

              ctx.fillStyle = item.forceColor || i % 2 > 0 ? 'white' : 'black'
              ctx.fillRect(currentX, 0, item.width, this.barHeight);
              currentX += item.width;

            });


            ctx.font = "12px Arial";
            ctx.fillStyle = 'black'
            let txt = this.outputText
            ctx.fillText(txt, (this.canvasWidth / 2) - (ctx.measureText(txt).width / 2)  , this.barHeight + 20);

          },

          drawSvg(value){

            let svg = this.$refs.bcSvg;

            svg.replaceChildren();
            svg.setAttribute('width', this.canvasWidth + 'px');

            const config = {
              'W': { width: this.wWidth },
              'N': { width: this.nWidth },
              '@': { width: this.nWidth, forceColor: 'white' }
            };
            

            let currentX = 0;

            [...value].forEach((char, i) => {

              let item = config[char];

              let rect = document.createElementNS("http://www.w3.org/2000/svg", 'rect');

              rect.setAttributeNS(null, 'x', currentX);
              rect.setAttributeNS(null, 'y', 0);
              rect.setAttributeNS(null, 'height', this.barHeight);
              rect.setAttributeNS(null, 'fill', item.forceColor || i % 2 > 0 ? 'white' : 'black');
              rect.setAttributeNS(null, 'width', item.width);

              currentX += item.width;
              svg.appendChild(rect);

            })
            
            let text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('y', '80');
            text.setAttribute('fill', '#black');
            text.style.fontSize = "12px";
            text.style.fontFamily = "Arial";
            text.textContent = this.outputText;
            svg.appendChild(text);
            text.setAttribute('x', (this.canvasWidth / 2) - (text.getComputedTextLength() / 2));

          },
          
          get outputText() {
            return '*' + [...this.inputText]
                .map(c => c.toUpperCase())
                .filter(char => this.code39Inverse[char])
                .join('') + '*'

          },
          
          get barcodePattern() {

            return  [...this.outputText]
                    .map(c => this.code39Inverse[c])
                    .filter(char => char !== undefined)
                    .join("@") + "@";

          },

          get canvasWidth() {
            return this.outputText.length * (7 * this.nWidth + 3 * this.wWidth)
          },

          code39Inverse: {
            0: "NNNWWNWNN",
            1: "WNNWNNNNW",
            2: "NNWWNNNNW",
            3: "WNWWNNNNN",
            4: "NNNWWNNNW",
            5: "WNNWWNNNN",
            6: "NNWWWNNNN",
            7: "NNNWNNWNW",
            8: "WNNWNNWNW",
            9: "NNWWNNWNN",

            A: "WNNNNWNNW",
            B: "NNWNNWNNW",
            C: "WNWNNWNNN",
            D: "NNNNWWNNW",
            E: "WNNNWWNNN",
            F: "NNWNWWNNN",
            G: "NNNNNWWNW",
            H: "WNNNNWWNN",
            I: "NNWNNWWNN",
            J: "NNNNWWWNN",

            K: "WNNNNNNWW",
            L: "NNWNNNNWW",
            M: "WNWNNNNWN",
            N: "NNNNWNNWW",
            O: "WNNNWNNWN",
            P: "NNWNWNNWN",
            Q: "NNNNNNWWW",
            R: "WNNNNNWWN",
            S: "NNWNNNWWN",
            T: "NNNNWNWWN",

            U: "WWNNNNNNW",
            V: "NWWNNNNNW",
            W: "WWWNNNNNN",
            X: "NWNNWNNNW",
            Y: "WWNNWNNNN",
            Z: "NWWNWNNNN",

            "-": "NWNNNNWNW",
            ".": "WWNNNNWNN",
            " ": "NWWNNNWNN",
            $: "NWNWNWNNN",
            "/": "NWNWNNNWN",
            "+": "NWNNNWNWN",
            "%": "NNNWNWNWN",

            "*": "NWNNWNWNN",
          },
        }));
      });
    </script>
  </body>
</html>
