<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>

      #bcCanvas {  
        image-rendering: pixelated; /* Chrome, Firefox */  
        image-rendering: crisp-edges; /* Safari */  
      }  
      
    </style>

    <title>Code 39 Encoder</title>
  </head>
  <body class="">
    <div class="h-dvh w-full flex items-center justify-center" x-data="encoder">
      <div class="flex flex-col gap-y-2 items-center">
        <div>
          <label class="block" for="text">Text to encode:</label>
          <input id="text" @keyup.escape="inputText=''" class="border rounded-md px-1" x-model="inputText" type="text" />
        </div>

        <div>HTML</div>
        <div class="flex mx-10">
          <template x-for="(step, index) in getBarcodeSteps()" :key="index">
            <div :class="`${step.cssColour} ${step.cssWidth} ${step.cssHeight}`"></div>
          </template>
        </div>
        
        <div class="bg-white -mt-2 p-1 text-xs" x-text="outputText"></div>

        <div class="mt-5">CANVAS</div>
        <div x-effect="drawCanvas($refs.bcCanvas)">

            <canvas class="" x-ref="bcCanvas" width="200" height="100">

            </canvas>

        </div>

        <div class="mt-5">SVG</div>
        <div x-effect="drawSvg($refs.bcSvg)">

          <svg class="" x-ref="bcSvg" width="300" height="100" xmlns="http://www.w3.org/2000/svg">

          </svg>

        </div>

      </div>

    </div>

    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.data("encoder", () => ({
          inputText: "",
          canvasHeight: 64,
          config: {
              'W': { width: 4, height: 64, cssWidth: 'w-1', cssHeight: 'h-16' },
              'N': { width: 2, height: 64, cssWidth: 'w-0.5', cssHeight: 'h-16' },
              '@': { width: 2, height: 64, cssWidth: 'w-0.5', cssHeight: 'h-16', forceColor: 'white', forceCssColor: 'bg-white' }
          },
          
          
          drawCanvas(canvas){
              
            const ctx = canvas.getContext('2d');

            ctx.canvas.width = this.canvasWidth;
            
            ctx.clearRect(0, 0, this.canvasWidth, 200);

            this.getBarcodeSteps().forEach(step => {
              ctx.fillStyle = step.colour
              ctx.fillRect(step.x, 0, step.width, step.height);

            });

            ctx.font = "12px Arial";
            ctx.fillStyle = 'black'
            ctx.fillText(this.outputText, (this.canvasWidth / 2) - (ctx.measureText(this.outputText).width / 2)  , this.canvasHeight + 20);

          },

          drawSvg(canvas){

            let svg = canvas;

            svg.replaceChildren();
            svg.setAttribute('width', this.canvasWidth + 'px');

            this.getBarcodeSteps().forEach(step => {
              let rect = document.createElementNS("http://www.w3.org/2000/svg", 'rect');
              rect.setAttributeNS(null, 'x', step.x);
              rect.setAttributeNS(null, 'y', 0);
              rect.setAttributeNS(null, 'height', step.height);
              rect.setAttributeNS(null, 'fill', step.colour);
              rect.setAttributeNS(null, 'width', step.width);
              svg.appendChild(rect);

            })

            
            let text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('y', this.canvasHeight + 20);
            text.setAttribute('fill', '#black');
            text.style.fontSize = "12px";
            text.style.fontFamily = "Arial";
            text.textContent = this.outputText;
            svg.appendChild(text);
            text.setAttribute('x', (this.canvasWidth / 2) - (text.getComputedTextLength() / 2));

          },
          
          get outputText() {
            return '*' + [...this.inputText]
                .map(c => c.toUpperCase())
                .filter(char => this.code39Inverse[char])
                .join('') + '*'

          },
          
          get barcodePattern() {

            return  [...this.outputText]
                    .map(c => this.code39Inverse[c])
                    .filter(char => char !== undefined)
                    .join("@") + "@";

          },

          get canvasWidth() {
            return this.outputText.length * (7 * this.config.N.width + 3 * this.config.W.width)
          },

          getBarcodeSteps() {

            let currentX = 0

            return [...this.barcodePattern].map((char, index) => {

              let item = this.config[char]

              const step = {
                x: currentX,
                width: item.width,
                height: item.height,
                cssWidth: item.cssWidth,
                cssHeight: item.cssHeight,
                colour: item.forceColor || index % 2 > 0 ? 'white' : 'black',
                cssColour: item.forceCssColor || index % 2 > 0 ? 'bg-white' : 'bg-black'

              };

              currentX += item.width

              return step

            })

          },

          code39Inverse: {
            0: "NNNWWNWNN",
            1: "WNNWNNNNW",
            2: "NNWWNNNNW",
            3: "WNWWNNNNN",
            4: "NNNWWNNNW",
            5: "WNNWWNNNN",
            6: "NNWWWNNNN",
            7: "NNNWNNWNW",
            8: "WNNWNNWNW",
            9: "NNWWNNWNN",

            A: "WNNNNWNNW",
            B: "NNWNNWNNW",
            C: "WNWNNWNNN",
            D: "NNNNWWNNW",
            E: "WNNNWWNNN",
            F: "NNWNWWNNN",
            G: "NNNNNWWNW",
            H: "WNNNNWWNN",
            I: "NNWNNWWNN",
            J: "NNNNWWWNN",

            K: "WNNNNNNWW",
            L: "NNWNNNNWW",
            M: "WNWNNNNWN",
            N: "NNNNWNNWW",
            O: "WNNNWNNWN",
            P: "NNWNWNNWN",
            Q: "NNNNNNWWW",
            R: "WNNNNNWWN",
            S: "NNWNNNWWN",
            T: "NNNNWNWWN",

            U: "WWNNNNNNW",
            V: "NWWNNNNNW",
            W: "WWWNNNNNN",
            X: "NWNNWNNNW",
            Y: "WWNNWNNNN",
            Z: "NWWNWNNNN",

            "-": "NWNNNNWNW",
            ".": "WWNNNNWNN",
            " ": "NWWNNNWNN",
            $: "NWNWNWNNN",
            "/": "NWNWNNNWN",
            "+": "NWNNNWNWN",
            "%": "NNNWNWNWN",

            "*": "NWNNWNWNN",
          },
        }));
      });
    </script>
  </body>
</html>
